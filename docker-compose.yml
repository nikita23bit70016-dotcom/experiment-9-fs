version: '3.8'\n\nservices:\n  frontend:\n    image: frontend-image:latest\n    ports:\n      - '3000:3000'\n    networks:\n      - my-network\n    depends_on:\n      - backend\n\n  backend:\n    image: backend-image:latest\n    ports:\n      - '5000:5000'\n    networks:\n      - my-network\n    depends_on:\n      - db\n\n  db:\n    image: mysql:5.7\n    restart: always\n    environment:\n      MYSQL_ROOT_PASSWORD: example\n      MYSQL_DATABASE: mydb\n      MYSQL_USER: user\n      MYSQL_PASSWORD: password\n    ports:\n      - '3306:3306'\n    networks:\n      - my-network\n\nnetworks:\n  my-network:\n    driver: bridge\n